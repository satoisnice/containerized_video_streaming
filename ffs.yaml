apiVersion: apps/v1
kind: Deployment
metadata:
  name: ffs
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ffs
  template:
    metadata:
      labels:
        app: ffs
    spec:
      containers:
        - name: ffs
          
          image: us-central1-docker.pkg.dev/containerized-video-service/video-streaming/ffs:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: ffs
spec:
  selector:
    app: ffs
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ffs-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ffs
  minReplicas: 1
  maxReplicas: 1
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
